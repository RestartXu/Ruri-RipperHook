name: Build Hooks

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: build-hooks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  BUILD_CONFIGURATION: Release

jobs:
  build-fmodelhook:
    name: Build FModelHook
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Update required submodules
        shell: pwsh
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --jobs 4 -- "FModel" "Source/Ruri.ShaderDecompiler"
          git submodule status --recursive

      - name: Show .NET info
        shell: pwsh
        run: dotnet --info

      - name: Build FModelHook GUI
        shell: pwsh
        # NuGet sources come from the repo-root nuget.config (nuget.org + SamboyDev).
        # No --configfile here: AssetRipper submodule isn't initialized in this job,
        # so AssetRipper\nuget.config wouldn't exist anyway.
        run: dotnet build "Source\Ruri.FModelHook.GUI\Ruri.FModelHook.GUI.csproj" -c $env:BUILD_CONFIGURATION -m:1

      - name: Upload FModelHook artifact
        uses: actions/upload-artifact@v4
        with:
          name: FModelHook-${{ env.BUILD_CONFIGURATION }}
          path: FModel/FModel/bin/Release/net10.0-windows/win-x64/**
          if-no-files-found: error

  build-pure-ripperhook:
    name: Build Pure RipperHook
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Update required submodules
        shell: pwsh
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --jobs 4 -- "AssetRipper" "Tpk" "FModel" "Source/Ruri.ShaderDecompiler"
          git submodule status --recursive

      - name: Show .NET info
        shell: pwsh
        run: dotnet --info

      - name: Build Pure RipperHook
        working-directory: Source/Ruri.RipperHook.GUI
        shell: cmd
        # NuGet sources come from the repo-root nuget.config (nuget.org + SamboyDev).
        # AssetRipper\nuget.config only declares SamboyDev and silently shadows nuget.org
        # when passed via --configfile, causing NU1101 for public packages like
        # K4os.Compression.LZ4 / SharpCompress / Microsoft.NET.ILLink.Tasks.
        run: dotnet build -c Release -p:PureRelease=true

      - name: Upload Pure RipperHook artifact
        uses: actions/upload-artifact@v4
        with:
          name: RipperHook-PureRelease
          path: AssetRipper/Source/0Bins/AssetRipper/Release/**
          if-no-files-found: error
